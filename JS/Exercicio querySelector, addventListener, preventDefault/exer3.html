<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/exer3.css">
    <title>Exercicio 3 - conversor de temperatura</title>
</head>
<body>
    <h1>Conversor de Temperatura</h1>

    <form>
        <div>
            <label for="inTemp">Temperatura:</label>
            <input type="number" id="inTemp" step="0.1" placeholder="Ex: 25.0" required>
        </div>

        <div>
            <label for="inOperacao">Tipo de Conversão:</label>
            <select id="inOperacao" required>
                <option value="selecionar">Selecione</option>
                <option value="celsios">celsios para fahrenheit</option>
                <option value="fahrenheit">fahrenheit para celsios</option>
            </select>
        </div>

        <div>
            <input type="submit" value="Converter">
        </div>
    </form>

    <h3></h3>

    <div class="container-tabela">
        <table>
            <thead>
                <tr>
                    <th>Temperatura</th>
                    <th>Classificação</th>
                </tr>
            </thead>
            <tbody id="tbResultados">
                <!-- Os resultados aparecerão aqui -->
            </tbody>
        </table>
        
    </div>

    <script src="js/exer3.js"></script>
</body>
</html>
