<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/exer4.css">
    <title>Notas de um estudante - exercicio 4</title>
</head>
<body>
    <h1>Notas de um estudante</h1>

    <form id="frmNotas">
        <div>
            <label for="inNome">Nome:</label>
            <input type="text" id="inNome" placeholder="Nome do aluno" required>
        </div>

        <div>
            <label for="inNota1">Primeira nota:</label>
            <input type="number" id="inNota1" step="0.1" min="0" max="10" placeholder="0.0" required>
        </div>

        <div>
            <label for="inNota2">Segunda nota:</label>
            <input type="number" id="inNota2" step="0.1" min="0" max="10" placeholder="0.0" required>
        </div>

        <div>
            <label for="inFrequencia">Frequência (%):</label>
            <input type="number" id="inFrequencia" step="0.1" min="0" max="100" placeholder="0" required>
        </div>

        <div>
            <input type="submit" value="Calcular">
        </div>
    </form>

    <h3 id="respResultado"></h3>

    <div class="container-tabela">
        <table>
            <thead>
                <tr>
                    <th>Aluno</th>
                    <th>Média</th>
                    <th>Freq.</th>
                    <th>Situação</th>
                </tr>
            </thead>
            <tbody id="tbResultados">
                <!-- Os resultados aparecerão aqui -->
            </tbody>
        </table>
    </div>

    <script src="js/exer4.js"></script>
</body>
</html>
