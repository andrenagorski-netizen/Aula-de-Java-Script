<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
         <script>
        const caracteres = "abcdefghijklmnopqrstuvwxyz0123456789@ # $ % & * ? ! ( ) - _ = + [ ] { } ; : , . < > / ?"
        let senha = ""

        for (let i = 0; i < 8; i++) {
            const pos = Math.floor(Math.random() * caracteres.length)
            senha += caracteres[pos]
        }
        document.write("Senha gerada: " + senha)
        //console.log("Senha gerada:", senha)
    </script>
    
</body>
</html>
