<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let codigo = parseInt(prompt('Informe o codigo'))
        switch(codigo){
            case 1:
                document.write('Alimento não perecível')
                break
            case 2:
                document.write('Alimento perecível')
                break
            case 3:
                document.write('Vestuário')
                break
            case 4:
                document.write('Higiene Pessoal')
                break
            case 5:
                document.write('Limpeza e utensílios domésticos')
                break
            case 6: 
                document.write('Eletrónicos')
                break
            case 7:
                document.write('Informática')
                break
            default:
                document.write('Não Existe!!!')
        }
        
    </script>
</body>
</html>
