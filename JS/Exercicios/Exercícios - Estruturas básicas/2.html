<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   <script>
      let nome = prompt('Informe o nome de usuário:');
      let senha = prompt('Informe a senha:');
      let idade = parseInt(prompt('Informe a idade:'));

      if (nome == "admin" && senha == "1234") {
          document.write("Acesso permitido como administrador");
      } else if (idade >= 18 || nome == "visitante") {
          document.write("Acesso permitido como usuário comum");
      } else {
          document.write("Acesso negado!");
      }
   </script >
</body>
</html>
