<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 6 - Metades</title>
  
</head>
<body>
    <div class="container">
        <h1>Listagem de Metades</h1>
        <script>
           
            for (let i = 1; i <= 10; i++) {
               
                let entrada = prompt('Informe o ' + i + 'º número:');
                let numero = parseFloat(entrada);
                
                
                let metade = numero / 2;
                
                
                alert('A metade de ' + numero + ' é ' + metade);
                
                // Adiciona o resultado na página com estilo premium
                document.write(`
                    <div class="result-item">
                        <span class="number">${i}º Número: <span class="value">${numero}</span></span>
                        <span class="half">Metade: ${metade}</span>
                    </div>
                `);
            }
        </script>
    </div>
</body>
</html>
