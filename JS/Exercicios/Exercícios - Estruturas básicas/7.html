<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quadrado de 10 Números</title>
</head>
<body>
    <script>
       for(let i = 1; i <= 10; i++){
        let numero = parseFloat(prompt('Informe o ' + i + 'º número:'))
    
        if(conta = numero * numero){
            document.write('O quadrado de ' + numero + ' é ' + conta + '<br>')
        }
       }
    </script>
</body>
</html>
