<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raiz Quadrada de 15 Números</title>
</head>
<body>
    <script>
        for (let i = 1; i <= 15; i++) {
            let numero = parseFloat(prompt("Informe o " + i + "º número:"));
            let raiz = Math.sqrt(numero);
            document.write("A raiz quadrada de " + numero + " é: " + raiz + "<br>");
        }
    </script>
</body>
</html>
