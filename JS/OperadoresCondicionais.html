<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let nome = prompt('Informe o nome')
        let nota = parseFloat(prompt('Informe a nota'))
        let media = 7
        if(nota > media){
            document.write(' O estudante ' + nome + ' está aprovado ')
        }else{
            document.write(' O estudante '+ nome + ' está reprovado')
        }
    </script>
</body>
</html>
