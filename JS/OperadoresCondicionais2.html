<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
    let nome = prompt('Informe o nome: ');
    // Correção: parceFload -> parseFloat
    let media = parseFloat(prompt('Informe a média')); 
    let frequencia = parseFloat(prompt('Informe a frequência'));

    if(media >= 7 && frequencia >= 75){
        document.write('Estudante: ' + nome + '<br>');
        document.write('Média: ' + media + '<br>');
        document.write('Aprovado(a)');
    } else {
        // Melhoria: Usar apenas 'else' cobre todas as outras situações
        document.write('Estudante: ' + nome + '<br>');
        document.write('Média: ' + media + '<br>');
        document.write('Reprovado(a) por média ou frequência');
    }
</script>

</body>
</html>
