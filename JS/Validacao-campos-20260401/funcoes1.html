<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script>
        //void: função sem retorno
        function mensagem(){
            alert('Estudar javascript')

        }
        //void: função sem retorno
        function ImprimirNumeros() {
            x = 1;
            while(x < 100){
                document.write(x, "<br>");
                x++;

            }    

           
        }
    </script>
</head>
<body>
    
    <button onclick="ImprimirNumeros()" >Imprimir números</button>
    <button onclick="mensagem()" >Estudar javascript</button>
</body>

</html>
