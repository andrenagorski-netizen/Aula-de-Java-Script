<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--media das notas-->   
    <script>
      const notas = [7, 8, 6, 9];
      let soma = 0;

        for (let nota of notas) {
            soma += nota;
        }

        const media = soma / notas.length;
        console.log("Média:", media.toFixed(1));
    </script>
</body>
</html>
