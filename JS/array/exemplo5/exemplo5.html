<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--ler 5 nomes e exibir na tela-->
    <!--puch = adicionar um item no array-->
    <script>
         const nomes = []; //cria UMA VARIAVEL VAZIA

        for (let i = 0; i < 5; i++) {
            let nome = prompt("Digite um nome:"); //prompt = caixa de digitação
            nomes.push(nome); //adiciona um item no array
        }

        console.log("Nomes digitados:");
        console.log(nomes);


    </script>
    
</body>
</html>
