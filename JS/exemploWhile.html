<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Exemplo com While</h1>
    <script>
        let numero   = parseInt(prompt('Informe um numero'))
        let contador = 1
        while(contador <= 10){
            let resultado = contador + numero
            document.write(numero + ' x ' + contador + ' = ' + resultado + '<br>')
            contador++
        }
    </script>
</body>
</html>
