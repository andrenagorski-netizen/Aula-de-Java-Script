<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Exemplo com uso de variaveis</h1>
    <script>
        // //string- Variavel de texto
        let Texto = "Linguagem JavaScript"
        //number- Variavel de numero
        let numeroInteiro = 10
        let numeroFracionado = 10.50
        let Inteiro = "10"
        //boolean- Variavel booleana
        let valor = false
        // nulo
        let teste = null
        // undefined- Variavel indefinida
        let teste2
        console.log(Texto)
        console.log(numeroInteiro)
        console.log(numeroFracionado)
        console.log(Inteiro)
        console.log(valor)
        console.log(teste)
        console.log(teste2)
        
        
 
    </script>
</body>
</html>
